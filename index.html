<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Interactive peekaboo game for babies with cute characters">
    <meta name="theme-color" content="#FFB84D">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="까꿍놀이">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <title>까꿍 놀이 - Peekaboo Game</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* 터치/클릭 하이라이트 제거 */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Arial', sans-serif;
            background: linear-gradient(135deg, #FFD93D 0%, #FF9A3D 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
            padding: 5rem 1rem 3rem;
            /* Safe area inset 지원 */
            padding-top: max(5rem, env(safe-area-inset-top));
            padding-left: max(1rem, env(safe-area-inset-left));
            padding-right: max(1rem, env(safe-area-inset-right));
            padding-bottom: max(3rem, env(safe-area-inset-bottom));
        }

        html {
            height: -webkit-fill-available;
        }

        /* PWA standalone 모드일 때 여백 조정 */
        @media (display-mode: standalone) {
            body {
                padding: 2rem 1rem 3rem;
                justify-content: center;
            }

            .menu-container {
                margin-top: 2rem;
            }

            .game-container {
                margin-top: 0;
            }
        }

        /* 설정 버튼 */
        .settings-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.3);
            border: none;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 100;
            backdrop-filter: blur(10px);
            /* 터치 영역 확장 */
            padding: 10px;
            margin: -10px;
            /* 성능 최적화 */
            will-change: transform;
            transform: translateZ(0);
        }

        .settings-button:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: rotate(90deg) translateZ(0);
        }

        .settings-button:active {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0.95) rotate(90deg) translateZ(0);
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .settings-button {
                top: max(20px, env(safe-area-inset-top, 20px));
                right: max(20px, env(safe-area-inset-right, 20px));
                width: 70px;
                height: 70px;
                font-size: 2rem;
            }
        }

        /* 설정 모달 */
        .settings-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .settings-modal.active {
            display: flex;
        }

        .settings-content {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            max-width: 400px;
            width: 90%;
            /* 성능 최적화 */
            transform: translateZ(0);
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .settings-content {
                padding: 2.5rem;
                width: 85%;
            }

            .settings-header h2 {
                font-size: 1.8rem;
            }

            .setting-item {
                padding: 1.5rem 0;
                font-size: 1.2rem;
            }

            .toggle-switch {
                width: 70px;
                height: 35px;
            }

            .toggle-switch::after {
                width: 31px;
                height: 31px;
            }

            .toggle-switch.active::after {
                left: 37px;
            }

            .lang-button {
                padding: 12px 18px;
                font-size: 1.05rem;
                flex: 1;
                min-width: 0;
            }
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .settings-header h2 {
            color: #FFB84D;
        }

        .close-button {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #999;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #eee;
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .toggle-switch {
            position: relative;
            width: 60px;
            height: 30px;
            background: #ccc;
            border-radius: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #FFB84D;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: white;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 32px;
        }

        .language-buttons {
            display: flex;
            gap: 10px;
        }

        .lang-button {
            padding: 8px 16px;
            border: 2px solid #FFB84D;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .lang-button.active {
            background: #FFB84D;
            color: white;
        }

        /* 메뉴 선택 화면 */
        .menu-container {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }

        .menu-container.active {
            display: flex;
        }

        .menu-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 1.5rem 3rem;
            border-radius: 20px;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            min-width: 300px;
            /* 성능 최적화 */
            will-change: transform;
            transform: translateZ(0);
        }

        .menu-button:hover {
            transform: translateY(-5px) scale(1.05) translateZ(0);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 1);
        }

        .menu-button:active {
            transform: translateY(-2px) scale(0.98) translateZ(0);
            background: rgba(255, 255, 255, 0.8);
        }

        .menu-icon {
            font-size: 2.5rem;
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .menu-button {
                min-width: 280px;
                width: 85vw;
                max-width: 400px;
                padding: 1.8rem 2rem;
                font-size: 1.8rem;
            }

            .menu-icon {
                font-size: 3rem;
            }
        }

        /* 가로 모드 최적화 */
        @media (max-width: 768px) and (orientation: landscape) {
            .menu-button {
                padding: 1rem 2rem;
                font-size: 1.5rem;
            }

            .menu-icon {
                font-size: 2rem;
            }

            .menu-container {
                gap: 1rem;
            }
        }

        /* 게임 화면 */
        .game-container {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 60vh;
            min-height: 500px;
            max-height: 700px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: none;
            margin-top: 5rem;
            /* 성능 최적화 */
            will-change: contents;
            transform: translateZ(0);
        }

        .game-container.active {
            display: block;
        }

        /* 모바일 세로 화면 최적화 */
        @media (max-width: 768px) and (orientation: portrait) {
            .game-container {
                height: 70vh;
                height: calc(var(--vh, 1vh) * 70);
                max-height: none;
                width: 95vw;
            }
        }

        /* 가로 모드 최적화 */
        @media (max-width: 926px) and (orientation: landscape) {
            .game-container {
                height: 80vh;
                height: calc(var(--vh, 1vh) * 80);
                min-height: 400px;
                margin-top: 2rem;
            }

            body {
                padding: 1rem;
            }
        }

        .character {
            position: absolute;
            font-size: 10rem;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: appear 0.5s ease-out;
            /* 터치 영역 확장 */
            padding: 2rem;
            margin: -2rem;
            /* 성능 최적화 */
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }

        .character:hover {
            transform: scale(1.2) rotate(5deg) translateZ(0);
        }

        .character:active {
            transform: scale(1.1) rotate(5deg) translateZ(0);
        }

        /* 모바일에서 캐릭터 크기 조정 */
        @media (max-width: 768px) {
            .character {
                font-size: 12rem;
            }
        }

        @media (max-width: 768px) and (orientation: landscape) {
            .character {
                font-size: 9rem;
            }
        }

        @keyframes appear {
            0% {
                transform: scale(0) rotate(-180deg);
                opacity: 0;
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }

        @keyframes disappear {
            0% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: scale(0) rotate(180deg);
                opacity: 0;
            }
        }

        @keyframes ripplePop {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.8;
            }
            100% {
                transform: translate(-50%, -50%) scale(15);
                opacity: 0;
            }
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            font-size: 1.5rem;
            color: white;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            border: none;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
            z-index: 50;
            display: none;
            backdrop-filter: blur(10px);
            /* 성능 최적화 */
            will-change: transform;
            transform: translateZ(0);
        }

        .back-button.active {
            display: block;
        }

        .back-button:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: scale(1.1) translateZ(0);
        }

        .back-button:active {
            background: rgba(0, 0, 0, 0.6);
            transform: scale(0.95) translateZ(0);
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .back-button {
                top: max(20px, env(safe-area-inset-top, 20px));
                left: max(20px, env(safe-area-inset-left, 20px));
                padding: 15px 25px;
                font-size: 1.8rem;
            }
        }

        .hidden {
            display: none;
        }

        /* 나이 선택 화면 */
        .age-container {
            display: none;
            flex-direction: column;
            gap: 2rem;
            align-items: center;
        }

        .age-container.active {
            display: flex;
        }

        .age-title {
            font-size: 2rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            margin-bottom: 1rem;
        }

        .age-button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 2rem 3rem;
            border-radius: 25px;
            font-size: 1.8rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            min-width: 300px;
            will-change: transform;
            transform: translateZ(0);
        }

        .age-button:hover {
            transform: translateY(-5px) scale(1.05) translateZ(0);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .age-button:active {
            transform: translateY(-2px) scale(0.98) translateZ(0);
        }

        .age-button .age-icon {
            font-size: 3rem;
        }

        .age-button .age-label {
            font-size: 1.5rem;
            font-weight: bold;
            color: #FF9A3D;
        }

        .age-button .age-desc {
            font-size: 1rem;
            color: #999;
        }

        @media (max-width: 768px) {
            .age-button {
                min-width: 280px;
                width: 85vw;
                max-width: 400px;
                padding: 2.5rem 2rem;
            }

            .age-title {
                font-size: 2.2rem;
            }
        }

        /* 사진 카드 캐릭터 */
        .photo-character {
            position: absolute;
            cursor: pointer;
            animation: appear 0.5s ease-out;
            will-change: transform;
            transform: translateZ(0);
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            margin: -1rem;
        }

        .photo-character:hover {
            transform: scale(1.1) translateZ(0);
        }

        .photo-character:active {
            transform: scale(1.05) translateZ(0);
        }

        .photo-character img {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            background: rgba(255, 255, 255, 0.5);
        }

        .photo-character .photo-label {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        @media (max-width: 768px) {
            .photo-character img {
                width: 220px;
                height: 220px;
                border-radius: 25px;
            }

            .photo-character .photo-label {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 768px) and (orientation: landscape) {
            .photo-character img {
                width: 160px;
                height: 160px;
            }

            .photo-character .photo-label {
                font-size: 1.8rem;
            }
        }

        /* PWA 설치 프롬프트 */
        .install-prompt {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateZ(0);
            background: white;
            padding: 1rem 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            gap: 1rem;
            z-index: 100;
            /* 성능 최적화 */
            will-change: transform;
        }

        .install-prompt.active {
            display: flex;
        }

        .install-button {
            background: #FFB84D;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .install-button:active {
            background: #FF9A3D;
            transform: scale(0.95);
        }

        .dismiss-button {
            background: #ccc;
            color: #666;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dismiss-button:active {
            background: #bbb;
            transform: scale(0.95);
        }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .install-prompt {
                bottom: max(20px, env(safe-area-inset-bottom, 20px));
                width: 90%;
                max-width: 500px;
                flex-wrap: wrap;
                justify-content: center;
                padding: 1.5rem;
            }

            .install-button,
            .dismiss-button {
                padding: 12px 24px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
    <!-- 설정 버튼 -->
    <button class="settings-button" onclick="openSettings()">⚙️</button>

    <!-- 설정 모달 -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <div class="settings-header">
                <h2 id="settingsTitle">설정</h2>
                <button class="close-button" onclick="closeSettings()">&times;</button>
            </div>

            <div class="setting-item">
                <span id="soundLabel">소리</span>
                <div class="toggle-switch active" id="soundToggle" onclick="toggleSound()"></div>
            </div>

            <div class="setting-item">
                <span id="autoChangeLabel">자동 교체</span>
                <div class="toggle-switch active" id="autoChangeToggle" onclick="toggleAutoChange()"></div>
            </div>

            <div class="setting-item">
                <span id="languageLabel">언어 / Language</span>
                <div class="language-buttons">
                    <button class="lang-button active" id="langKo" onclick="changeLanguage('ko')">한국어</button>
                    <button class="lang-button" id="langEn" onclick="changeLanguage('en')">English</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 나이 선택 화면 -->
    <div class="age-container active" id="ageContainer">
        <div class="age-title" id="ageTitle">나이를 선택하세요</div>
        <button class="age-button" onclick="selectAge('baby')">
            <span class="age-icon">👶</span>
            <span class="age-label" id="ageBabyLabel">0~1세</span>
            <span class="age-desc" id="ageBabyDesc">이모지로 놀기</span>
        </button>
        <button class="age-button" onclick="selectAge('toddler')">
            <span class="age-icon">🧒</span>
            <span class="age-label" id="ageToddlerLabel">2세+</span>
            <span class="age-desc" id="ageToddlerDesc">사진과 단어 배우기</span>
        </button>
    </div>

    <!-- 메뉴 선택 화면 (0~1세 이모지 모드) -->
    <div class="menu-container" id="menuContainer">
        <button class="menu-button" onclick="startGame('vehicles')">
            <span class="menu-icon">🚗</span>
            <span id="themeVehicles">탈 것</span>
        </button>
        <button class="menu-button" onclick="startGame('animals')">
            <span class="menu-icon">🐶</span>
            <span id="themeAnimals">동물</span>
        </button>
        <button class="menu-button" onclick="startGame('food')">
            <span class="menu-icon">🍎</span>
            <span id="themeFood">음식</span>
        </button>
        <button class="menu-button" onclick="startGame('all')">
            <span class="menu-icon">🌈</span>
            <span id="themeAll">전체</span>
        </button>
    </div>

    <!-- 게임 화면 -->
    <div class="game-container" id="gameContainer">
    </div>

    <!-- 게임 UI (게임 컨테이너 밖) -->
    <button class="back-button" id="backButton" onclick="backToMenu()">← 뒤로</button>
    <button class="back-button" id="backToAgeButton" onclick="backToAge()">← 뒤로</button>

    <!-- PWA 설치 프롬프트 -->
    <div class="install-prompt" id="installPrompt">
        <span id="installText">앱으로 설치하시겠어요?</span>
        <button class="install-button" id="installButton">설치</button>
        <button class="dismiss-button" onclick="dismissInstall()">나중에</button>
    </div>

    <script>
        // 다국어 텍스트
        const i18n = {
            ko: {
                settingsTitle: '설정',
                soundLabel: '소리',
                autoChangeLabel: '자동 교체',
                languageLabel: '언어 / Language',
                ageTitle: '나이를 선택하세요',
                ageBabyLabel: '0~1세',
                ageBabyDesc: '이모지로 놀기',
                ageToddlerLabel: '2세+',
                ageToddlerDesc: '사진과 단어 배우기',
                themeVehicles: '탈 것',
                themeAnimals: '동물',
                themeFood: '음식',
                themeAll: '전체',
                backButton: '← 뒤로',
                installText: '앱으로 설치하시겠어요?',
                installButton: '설치'
            },
            en: {
                settingsTitle: 'Settings',
                soundLabel: 'Sound',
                autoChangeLabel: 'Auto Change',
                languageLabel: '언어 / Language',
                ageTitle: 'Select Age',
                ageBabyLabel: '0~1',
                ageBabyDesc: 'Play with emojis',
                ageToddlerLabel: '2+',
                ageToddlerDesc: 'Learn with photos & words',
                themeVehicles: 'Vehicles',
                themeAnimals: 'Animals',
                themeFood: 'Food',
                themeAll: 'All',
                backButton: '← Back',
                installText: 'Install as app?',
                installButton: 'Install'
            }
        };

        let currentLang = localStorage.getItem('language') || 'ko';
        let soundEnabled = localStorage.getItem('soundEnabled') !== 'false';
        let autoChangeEnabled = localStorage.getItem('autoChangeEnabled') !== 'false';
        let deferredPrompt;

        // 언어 변경
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);

            document.getElementById('langKo').classList.toggle('active', lang === 'ko');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');

            // UI 텍스트 업데이트
            document.getElementById('settingsTitle').textContent = i18n[lang].settingsTitle;
            document.getElementById('soundLabel').textContent = i18n[lang].soundLabel;
            document.getElementById('autoChangeLabel').textContent = i18n[lang].autoChangeLabel;
            document.getElementById('ageTitle').textContent = i18n[lang].ageTitle;
            document.getElementById('ageBabyLabel').textContent = i18n[lang].ageBabyLabel;
            document.getElementById('ageBabyDesc').textContent = i18n[lang].ageBabyDesc;
            document.getElementById('ageToddlerLabel').textContent = i18n[lang].ageToddlerLabel;
            document.getElementById('ageToddlerDesc').textContent = i18n[lang].ageToddlerDesc;
            document.getElementById('themeVehicles').textContent = i18n[lang].themeVehicles;
            document.getElementById('themeAnimals').textContent = i18n[lang].themeAnimals;
            document.getElementById('themeFood').textContent = i18n[lang].themeFood;
            document.getElementById('themeAll').textContent = i18n[lang].themeAll;
            document.getElementById('backButton').textContent = i18n[lang].backButton;
            document.getElementById('backToAgeButton').textContent = i18n[lang].backButton;
            document.getElementById('installText').textContent = i18n[lang].installText;
            document.getElementById('installButton').textContent = i18n[lang].installButton;

            // 게임 중이면 현재 표시된 사진 라벨 업데이트
            if (currentGameMode === 'photo') {
                const label = gameContainer.querySelector('.photo-label');
                if (label && currentPhotoItem) {
                    label.textContent = lang === 'ko' ? currentPhotoItem.ko : currentPhotoItem.en;
                }
            }

            document.documentElement.lang = lang === 'ko' ? 'ko' : 'en';
        }

        // 음소거 토글
        function toggleSound() {
            soundEnabled = !soundEnabled;
            localStorage.setItem('soundEnabled', soundEnabled);
            document.getElementById('soundToggle').classList.toggle('active', soundEnabled);
        }

        // 자동 교체 토글
        function toggleAutoChange() {
            autoChangeEnabled = !autoChangeEnabled;
            localStorage.setItem('autoChangeEnabled', autoChangeEnabled);
            document.getElementById('autoChangeToggle').classList.toggle('active', autoChangeEnabled);

            // 게임 중이면 타이머 재시작 또는 중지
            if (gameInterval) {
                clearTimeout(gameInterval);
                gameInterval = null;
                if (autoChangeEnabled) {
                    scheduleNext();
                }
            }
        }

        // 설정 모달
        function openSettings() {
            document.getElementById('settingsModal').classList.add('active');
        }

        function closeSettings() {
            document.getElementById('settingsModal').classList.remove('active');
        }

        // PWA 설치
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installPrompt').classList.add('active');
        });

        document.getElementById('installButton').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                document.getElementById('installPrompt').classList.remove('active');
            }
        });

        function dismissInstall() {
            document.getElementById('installPrompt').classList.remove('active');
        }

        // Service Worker 등록
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => {
                console.log('Service Worker registered');
            });
        }

        // 게임 로직
        const gameContainer = document.getElementById('gameContainer');
        const menuContainer = document.getElementById('menuContainer');
        const ageContainer = document.getElementById('ageContainer');
        let currentCharacters = [];
        let gameInterval = null;
        let currentGameMode = 'emoji'; // 'emoji' or 'photo'
        let animalData = null;
        let currentPhotoItem = null;

        // animal.json 로드
        fetch('animal.json')
            .then(res => res.json())
            .then(data => { animalData = data; })
            .catch(err => console.error('Failed to load animal.json:', err));

        // 나이 선택
        function selectAge(age) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            playSuccessSound();
            if (age === 'baby') {
                currentGameMode = 'emoji';
                ageContainer.classList.remove('active');
                menuContainer.classList.add('active');
                document.getElementById('backToAgeButton').classList.add('active');
            } else if (age === 'toddler') {
                currentGameMode = 'photo';
                ageContainer.classList.remove('active');
                gameContainer.classList.add('active');
                document.getElementById('backButton').classList.add('active');
                showPhotoCharacter();
                scheduleNext();
            }
        }

        // 테마별 캐릭터 정의
        const themes = {
            vehicles: [
                '🚗', '🚕', '🚙', '🚌', '🚎', '🏎️', '🚓', '🚑',
                '🚒', '🚐', '🚚', '🚛', '🚜', '🏍️', '🛵', '🚲',
                '🚂', '🚃', '🚄', '🚅', '🚆', '🚇', '🚈', '🚉',
                '🚝', '🚞', '🚟', '🚡', '🛺', '🚋',
                '✈️', '🛩️', '🚁', '🚀', '🛸', '🚢', '⛴️', '🛥️',
                '⛵', '🚤', '🛳️'
            ],
            animals: [
                '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼',
                '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔',
                '🐧', '🐦', '🐤', '🐣', '🐥', '🦆', '🦅', '🦉',
                '🦇', '🐺', '🐗', '🐴', '🦄', '🐝', '🐛', '🦋',
                '🐌', '🐞', '🐜', '🦕', '🦖', '🐉', '🐳', '🐬',
                '🐟', '🐠', '🐡', '🦈', '🐙', '🦀', '🦞',
                '🦒', '🦘', '🦙', '🦛', '🦏', '🐘', '🐊', '🦓',
                '🐆', '🦍', '🦧', '🐪', '🐫', '🦌', '🐕', '🐩',
                '🐈', '🦜', '🦚', '🦩', '🦢', '🦫', '🦦', '🦥'
            ],
            food: [
                '🍎', '🍐', '🍊', '🍋', '🍌', '🍉', '🍇', '🍓',
                '🍈', '🍒', '🍑', '🥭', '🍍', '🥥', '🥝', '🍅',
                '🍔', '🍕', '🌭', '🌮', '🌯', '🥙', '🥗', '🍿',
                '🧈', '🍞', '🥐', '🥨', '🥯', '🧀', '🥚', '🍳',
                '🧇', '🥞', '🧈', '🍖', '🍗', '🥩', '🍤', '🍱',
                '🍙', '🍚', '🍛', '🍜', '🍝', '🍠', '🍢', '🍣',
                '🍥', '🍡', '🥟', '🥠', '🥡', '🦀', '🦞', '🍦',
                '🍧', '🍨', '🍩', '🍪', '🎂', '🍰', '🧁', '🍫',
                '🍬', '🍭', '🍮', '🍯'
            ],
            all: []
        };

        themes.all = [...themes.vehicles, ...themes.animals, ...themes.food,
                      '⭐', '🌟', '💫', '🌈', '🎈', '🎁', '🎀', '🎨',
                      '⚽', '🏀', '🎾', '⚾', '🥎', '🏐'];

        // Web Audio API
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        const audioCtx = new AudioContext();

        function playClickSound() {
            if (!soundEnabled) return;

            // 다양한 소리 패턴 중 랜덤 선택
            const patterns = [
                // 패턴 1: 높은 톤의 징글
                () => {
                    [800, 1000, 1200].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        const start = audioCtx.currentTime + (i * 0.05);
                        gain.gain.setValueAtTime(0.2, start);
                        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.15);
                        osc.start(start);
                        osc.stop(start + 0.15);
                    });
                },
                // 패턴 2: 낮은 톤에서 높은 톤으로
                () => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.2);
                    osc.type = 'triangle';
                    gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.25);
                },
                // 패턴 3: 통통 튀는 소리
                () => {
                    [600, 800, 600].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'square';
                        const start = audioCtx.currentTime + (i * 0.08);
                        gain.gain.setValueAtTime(0.15, start);
                        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.1);
                        osc.start(start);
                        osc.stop(start + 0.1);
                    });
                },
                // 패턴 4: 종소리 느낌
                () => {
                    [523, 659].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'sine';
                        const start = audioCtx.currentTime + (i * 0.1);
                        gain.gain.setValueAtTime(0.2, start);
                        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.3);
                        osc.start(start);
                        osc.stop(start + 0.3);
                    });
                },
                // 패턴 5: 재미있는 멜로디
                () => {
                    [700, 900, 1100, 900].forEach((freq, i) => {
                        const osc = audioCtx.createOscillator();
                        const gain = audioCtx.createGain();
                        osc.connect(gain);
                        gain.connect(audioCtx.destination);
                        osc.frequency.value = freq;
                        osc.type = 'triangle';
                        const start = audioCtx.currentTime + (i * 0.06);
                        gain.gain.setValueAtTime(0.18, start);
                        gain.gain.exponentialRampToValueAtTime(0.01, start + 0.12);
                        osc.start(start);
                        osc.stop(start + 0.12);
                    });
                }
            ];

            // 랜덤 패턴 실행
            const randomPattern = patterns[Math.floor(Math.random() * patterns.length)];
            randomPattern();
        }

        // TTS (Text-to-Speech)
        let isSpeaking = false;

        function speakWord(text, onEnd) {
            if (!soundEnabled || !('speechSynthesis' in window)) {
                if (onEnd) onEnd();
                return;
            }
            // 이전 발화 중지
            speechSynthesis.cancel();
            isSpeaking = true;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLang === 'ko' ? 'ko-KR' : 'en-US';
            utterance.rate = 0.8;
            utterance.pitch = 1.2;
            utterance.volume = 1.0;
            utterance.onend = () => {
                isSpeaking = false;
                if (onEnd) onEnd();
            };
            utterance.onerror = () => {
                isSpeaking = false;
                if (onEnd) onEnd();
            };
            speechSynthesis.speak(utterance);
        }

        function playAppearSound() {
            if (!soundEnabled) return;
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
            oscillator.type = 'triangle';
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            oscillator.start(audioCtx.currentTime);
            oscillator.stop(audioCtx.currentTime + 0.15);
        }

        function playSuccessSound() {
            if (!soundEnabled) return;
            [523, 659, 784].forEach((freq, index) => {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                const startTime = audioCtx.currentTime + (index * 0.1);
                gainNode.gain.setValueAtTime(0.2, startTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + 0.15);
                oscillator.start(startTime);
                oscillator.stop(startTime + 0.15);
            });
        }

        function startGame(theme) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }

            playSuccessSound();

            menuContainer.classList.remove('active');
            document.getElementById('backToAgeButton').classList.remove('active');
            gameContainer.classList.add('active');

            // 게임 UI 표시
            document.getElementById('backButton').classList.add('active');

            currentCharacters = themes[theme];

            showCharacter();
            scheduleNext();
        }

        function backToAge() {
            playClickSound();
            menuContainer.classList.remove('active');
            document.getElementById('backToAgeButton').classList.remove('active');
            ageContainer.classList.add('active');
        }

        function backToMenu() {
            playClickSound();

            if (gameInterval) {
                clearTimeout(gameInterval);
                gameInterval = null;
            }

            gameContainer.classList.remove('active');
            document.getElementById('backButton').classList.remove('active');

            // 캐릭터/사진 제거
            const characters = gameContainer.querySelectorAll('.character, .photo-character');
            characters.forEach(el => el.remove());

            // TTS도 중지
            speechSynthesis.cancel();
            isSpeaking = false;

            if (currentGameMode === 'photo') {
                // 사진 모드에서는 나이 선택 화면으로
                ageContainer.classList.add('active');
                currentPhotoItem = null;
            } else {
                // 이모지 모드에서는 테마 선택 화면으로
                menuContainer.classList.add('active');
                document.getElementById('backToAgeButton').classList.add('active');
            }
        }

        function getRandomPosition() {
            const containerRect = gameContainer.getBoundingClientRect();
            // 화면 너비에 따라 동적 버퍼 설정 (캐릭터가 잘리지 않도록)
            const isMobile = window.innerWidth <= 768;
            const buffer = isMobile ? 280 : 250;
            const maxX = containerRect.width - buffer;
            const maxY = containerRect.height - buffer;

            return {
                x: Math.random() * maxX + 20,
                y: Math.random() * maxY + 20
            };
        }

        function showCharacter() {
            const oldCharacters = gameContainer.querySelectorAll('.character');
            oldCharacters.forEach(char => {
                char.style.animation = 'disappear 0.3s ease-out forwards';
                setTimeout(() => char.remove(), 300);
            });

            const character = document.createElement('div');
            character.className = 'character';
            character.textContent = currentCharacters[Math.floor(Math.random() * currentCharacters.length)];

            // 랜덤 크기 설정 (font-size 직접 변경)
            const isMobile = window.innerWidth <= 768;
            const sizes = isMobile ? ['10rem', '12rem', '14rem'] : ['8rem', '10rem', '12rem'];
            const randomSize = sizes[Math.floor(Math.random() * sizes.length)];
            character.style.fontSize = randomSize;

            const position = getRandomPosition();
            character.style.left = position.x + 'px';
            character.style.top = position.y + 'px';

            playAppearSound();

            character.addEventListener('click', (e) => {
                playClickSound();

                // 캐릭터 클릭시에도 원 효과 (클릭 위치 기준)
                const rect = gameContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                createRippleEffect(x, y);

                character.style.animation = 'disappear 0.3s ease-out forwards';
                setTimeout(() => {
                    character.remove();
                    showCharacter();
                }, 300);
            });

            gameContainer.appendChild(character);
        }

        // 사진 모드 캐릭터 표시
        function showPhotoCharacter() {
            if (!animalData || !animalData.items.length) return;

            const oldChars = gameContainer.querySelectorAll('.photo-character');
            oldChars.forEach(char => {
                char.style.animation = 'disappear 0.3s ease-out forwards';
                setTimeout(() => char.remove(), 300);
            });

            const item = animalData.items[Math.floor(Math.random() * animalData.items.length)];
            currentPhotoItem = item;

            const card = document.createElement('div');
            card.className = 'photo-character';

            const img = document.createElement('img');
            img.src = item.image;
            img.alt = item.en;
            img.draggable = false;

            const label = document.createElement('div');
            label.className = 'photo-label';
            label.textContent = currentLang === 'ko' ? item.ko : item.en;

            card.appendChild(img);
            card.appendChild(label);

            // 위치 계산
            const containerRect = gameContainer.getBoundingClientRect();
            const isMobile = window.innerWidth <= 768;
            const cardSize = isMobile ? 260 : 240;
            const maxX = Math.max(10, containerRect.width - cardSize);
            const maxY = Math.max(10, containerRect.height - cardSize - 40);
            card.style.left = (Math.random() * maxX) + 'px';
            card.style.top = (Math.random() * maxY) + 'px';

            playAppearSound();

            card.addEventListener('click', (e) => {
                // speech 중이면 클릭 무시
                if (isSpeaking) return;

                playClickSound();
                const rect = gameContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                createRippleEffect(x, y);

                // 단어 읽어준 뒤 다음 사진으로 전환
                speakWord(currentLang === 'ko' ? item.ko : item.en, () => {
                    card.style.animation = 'disappear 0.3s ease-out forwards';
                    setTimeout(() => {
                        card.remove();
                        showPhotoCharacter();
                    }, 300);
                });
            });

            gameContainer.appendChild(card);
        }

        function scheduleNext() {
            // 자동 교체가 꺼져있으면 타이머 안 돌림
            if (!autoChangeEnabled) {
                return;
            }

            const delay = 3000 + Math.random() * 2000; // 3-5초
            gameInterval = setTimeout(() => {
                // 사진 모드에서 speech 중이면 다음 전환 보류
                if (currentGameMode === 'photo' && isSpeaking) {
                    scheduleNext();
                    return;
                }
                if (currentGameMode === 'photo') {
                    showPhotoCharacter();
                } else {
                    showCharacter();
                }
                scheduleNext();
            }, delay);
        }

        // 원 효과 생성 함수
        function createRippleEffect(x, y) {
            const colors = ['#FF6B6B', '#FFB84D', '#FFE66D', '#4ECDC4', '#45B7D1', '#A78BFA'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];

            const ripple = document.createElement('div');
            ripple.className = 'ripple-effect';
            ripple.style.position = 'absolute';
            ripple.style.left = x + 'px';
            ripple.style.top = y + 'px';
            ripple.style.width = '20px';
            ripple.style.height = '20px';
            ripple.style.borderRadius = '50%';
            ripple.style.backgroundColor = randomColor;
            ripple.style.transform = 'translate(-50%, -50%)';
            ripple.style.pointerEvents = 'none';
            ripple.style.animation = 'ripplePop 0.6s ease-out forwards';
            gameContainer.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        gameContainer.addEventListener('click', (e) => {
            if (e.target === gameContainer) {
                if (soundEnabled) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.frequency.value = 200;
                    osc.type = 'sine';
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + 0.1);
                }

                // 배경 클릭시 원 효과
                createRippleEffect(e.offsetX, e.offsetY);
            }
        });

        // 모바일 viewport height 조정 (주소창 대응)
        function setVH() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        setVH();
        window.addEventListener('resize', setVH);
        window.addEventListener('orientationchange', () => {
            setTimeout(setVH, 100);
        });

        // 초기 언어 설정
        changeLanguage(currentLang);
        document.getElementById('soundToggle').classList.toggle('active', soundEnabled);
        document.getElementById('autoChangeToggle').classList.toggle('active', autoChangeEnabled);
    </script>
